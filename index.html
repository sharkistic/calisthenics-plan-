<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>30 Day Calisthenics</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui;
}

body{
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#020617;
padding:18px;
text-align:center;
font-size:20px;
font-weight:600;
}

main{
flex:1;
overflow:hidden;
position:relative;
}

.page{
display:none;
height:100%;
overflow:auto;
padding:20px;
}

.active{
display:block;
}

.slider{
display:flex;
transition:0.35s;
}

.day{
min-width:100%;
padding:10px;
max-width:650px;
margin:auto;
}

.dayHeader{
background:linear-gradient(135deg,#f97316,#fb923c);
padding:24px;
border-radius:16px;
margin-bottom:20px;
}

.dayTitle{
font-size:24px;
font-weight:700;
}

.daySubtitle{
opacity:0.9;
margin-top:6px;
}

.exercise{
background:#1e293b;
padding:16px;
border-radius:14px;
margin-bottom:12px;
border:1px solid rgba(255,255,255,0.05);
}

.exerciseName{
font-size:17px;
font-weight:600;
}

.exerciseMeta{
font-size:14px;
opacity:0.8;
margin-top:4px;
}

.badge{
display:inline-block;
background:#020617;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-top:6px;
}

.completeBtn{
width:100%;
margin-top:18px;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
background:#f97316;
color:white;
}

.completeBtn.done{
background:#22c55e;
}

nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px 0;
}

nav button{
background:none;
border:none;
color:white;
font-size:14px;
}

.progressRing{
width:180px;
height:180px;
border-radius:50%;
margin:auto;
margin-top:40px;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
border:12px solid #1e293b;
}

.calendar{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
margin-top:30px;
}

.calDay{
background:#1e293b;
padding:12px;
border-radius:8px;
text-align:center;
}

.calDay.done{
background:#22c55e;
}

.timer{
text-align:center;
margin-top:40px;
}

.timerDisplay{
font-size:42px;
margin:12px;
}

button{
cursor:pointer;
}

</style>

</head>

<body>

<header>30 Day Calisthenics</header>

<main>

<!-- WORKOUT PAGE -->

<div class="page active" id="workoutPage">

<div class="slider" id="slider"></div>

</div>

<!-- PROGRESS PAGE -->

<div class="page" id="progressPage">

<div class="progressRing" id="progressRing">0%</div>

<h3 style="text-align:center;margin-top:20px">
Streak: <span id="streak">0</span> days
</h3>

<div class="calendar" id="calendar"></div>

</div>

<!-- TIMER PAGE -->

<div class="page" id="timerPage">

<div class="timer">

<h2>Workout Timer</h2>

<div class="timerDisplay" id="timer">30</div>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

</div>

</main>

<nav>

<button onclick="showPage('workoutPage')">Workouts</button>
<button onclick="showPage('progressPage')">Progress</button>
<button onclick="showPage('timerPage')">Timer</button>

</nav>

<script>

const workouts=[

{
title:"Day 1",
subtitle:"Upper Body Push & Core",
exercises:[
["Wall Pushups","3 sets • 8-10 reps"],
["Incline Pushups","3 sets • 5-8 reps"],
["Plank Hold","3 sets • 20 sec"],
["Dead Hang","3 sets • 10 sec"]
]
},

{
title:"Day 3",
subtitle:"Lower Body",
exercises:[
["Bodyweight Squats","3 sets • 15 reps"],
["Assisted Lunges","3 sets • 8 / leg"],
["Glute Bridges","3 sets • 15 reps"],
["Calf Raises","3 sets • 20 reps"]
]
},

{
title:"Day 5",
subtitle:"Full Body",
exercises:[
["Modified Burpees","3 sets • 8 reps"],
["Bear Crawl","20 seconds"],
["Superman Hold","15 seconds"],
["Hollow Hold","15 seconds"]
]
}

]

const slider=document.getElementById("slider")

workouts.forEach((day,i)=>{

let done=localStorage.getItem("day"+i)

let exerciseHTML=""

day.exercises.forEach(e=>{

exerciseHTML+=`

<div class="exercise">

<div class="exerciseName">${e[0]}</div>

<div class="exerciseMeta">${e[1]}</div>

<span class="badge">Strength</span>

</div>

`

})

slider.innerHTML+=`

<div class="day">

<div class="dayHeader">

<div class="dayTitle">${day.title}</div>

<div class="daySubtitle">${day.subtitle}</div>

<span class="badge">Beginner</span>

</div>

${exerciseHTML}

<button onclick="complete(${i})"
class="completeBtn ${done?'done':''}">

${done?'Workout Completed ✓':'Complete Workout'}

</button>

</div>

`

})

function complete(i){

localStorage.setItem("day"+i,"1")

location.reload()

}

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

let index=0
let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{

let diff=e.changedTouches[0].clientX-startX

if(diff>50) prev()
if(diff<-50) next()

})

function next(){

if(index<workouts.length-1){
index++
updateSlide()
}

}

function prev(){

if(index>0){
index--
updateSlide()
}

}

function updateSlide(){

slider.style.transform="translateX(-"+index*100+"%)"

}

function updateProgress(){

let done=0

for(let i=0;i<workouts.length;i++){

if(localStorage.getItem("day"+i)) done++

}

let percent=Math.round(done/workouts.length*100)

document.getElementById("progressRing").innerText=percent+"%"

}

updateProgress()

const calendar=document.getElementById("calendar")

for(let i=0;i<30;i++){

let done=localStorage.getItem("day"+i)

calendar.innerHTML+=`

<div class="calDay ${done?'done':''}">
${i+1}
</div>

`

}

let time=30
let timer

function startTimer(){

timer=setInterval(()=>{

time--
document.getElementById("timer").innerText=time

if(time==0){
clearInterval(timer)
}

},1000)

}

function resetTimer(){

clearInterval(timer)
time=30
document.getElementById("timer").innerText=time

}

</script>

</body>
</html>
